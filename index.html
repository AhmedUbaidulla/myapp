<!DOCTYPE html>
<html>
<head>
<title>Chemistry Quiz</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f0f0f0;
padding:40px;
}

.quiz-box{
background:white;
padding:30px;
border-radius:10px;
max-width:600px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

.correct{
background:green;
color:white;
}

.wrong{
background:red;
color:white;
}

</style>

</head>

<body>

<div class="quiz-box">

<h2 id="question">Question appears here</h2>

<div id="answers"></div>

<h3 id="score"></h3>

</div>

<script>

const quiz = [

{
question:"What is the name of CH4?",
answers:["Methane","Ethane","Propane","Butane"],
correct:0
},

{
question:"How many carbons in propane?",
answers:["1","2","3","4"],
correct:2
},

{
question:"Suffix for alcohol?",
answers:["-ane","-ene","-ol","-yne"],
correct:2
},

{
question:"Name of C2H6?",
answers:["Ethane","Methane","Propane","Butane"],
correct:0
}

];

let currentQuestion = 0;
let score = 0;

function loadQuestion(){

const q = quiz[currentQuestion];

document.getElementById("question").innerText = q.question;

let answersHTML="";

q.answers.forEach((answer,index)=>{
answersHTML += `<button onclick="checkAnswer(${index})">${answer}</button><br>`;
});

document.getElementById("answers").innerHTML = answersHTML;

}

function checkAnswer(index){

const correct = quiz[currentQuestion].correct;

if(index===correct){
score++;
}

currentQuestion++;

if(currentQuestion >= quiz.length){

document.getElementById("question").innerText="Quiz Finished!";
document.getElementById("answers").innerHTML="";
document.getElementById("score").innerText="Score: "+score+" / "+quiz.length;

return;

}

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
