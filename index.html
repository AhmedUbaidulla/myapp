<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organic Chemistry Compound Namer</title>
</head>
<body>
  <h1>Organic Chemistry Compound Namer</h1>

  <label for="carbons">Number of carbons:</label>
  <select id="carbons">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
  </select>

  <br><br>

  <label for="type">Compound type:</label>
  <select id="type">
    <option value="alkane">Alkane</option>
    <option value="alkene">Alkene</option>
    <option value="alcohol">Alcohol</option>
  </select>

  <br><br>

  <label for="position">Position (for alkene/alcohol):</label>
  <select id="position">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>

  <br><br>

  <button id="generateBtn">Generate Name</button>

  <h2>Result:</h2>
  <p id="result">Your compound name will appear here.</p>

  <script src="script.js"></script>
</body>
</html>
