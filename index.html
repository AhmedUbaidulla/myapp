<!DOCTYPE html>
<html>
<head>
<title>Chemistry Quiz</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
padding:40px;
}

.quiz-box{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="quiz-box">

<h2 id="question">Question</h2>

<div id="answers"></div>

<h3 id="result"></h3>

<button onclick="nextQuestion()">Next Question</button>

</div>

<script>

const quiz = [

{
question:"What is the name of CH4?",
answers:["Methane","Ethane","Propane","Butane"],
correct:0
},

{
question:"How many carbons in propane?",
answers:["1","2","3","4"],
correct:2
},

{
question:"Suffix for alcohol?",
answers:["-ane","-ene","-ol","-yne"],
correct:2
}

];

let current = 0;

function loadQuestion(){

const q = quiz[current];

document.getElementById("question").innerText = q.question;

let answersHTML="";

q.answers.forEach((a,i)=>{
answersHTML += `<button onclick="checkAnswer(${i})">${a}</button><br>`;
});

document.getElementById("answers").innerHTML = answersHTML;

document.getElementById("result").innerText="";

}

function checkAnswer(i){

if(i===quiz[current].correct){
document.getElementById("result").innerText="✅ Correct!";
}
else{
document.getElementById("result").innerText="❌ Wrong";
}

}

function nextQuestion(){

current++;

if(current>=quiz.length){
document.getElementById("question").innerText="Quiz Finished!";
document.getElementById("answers").innerHTML="";
return;
}

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
